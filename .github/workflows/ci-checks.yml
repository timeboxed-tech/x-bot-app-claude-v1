name: CI Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-format-typecheck:
    name: Lint, Format & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: api

      - name: Prettier check
        run: npx prettier --check .

      - name: ESLint
        run: npx eslint . --ext .ts,.tsx

      - name: Typecheck shared
        run: npx tsc -p shared/tsconfig.json --noEmit

      - name: Typecheck API
        run: npx tsc -p api/tsconfig.json --noEmit

      - name: Typecheck Web
        run: npx tsc -p web/tsconfig.json --noEmit

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-format-typecheck
    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t x-bot-app:ci .

  e2e-web:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: web

      - name: Start app with docker-compose
        run: docker compose up -d --build --wait

      - name: Run E2E tests
        run: npx playwright test
        working-directory: web
        env:
          CI: true
          USE_DOCKER: true
          BASE_URL: http://localhost:3001

      - name: Docker logs
        if: always()
        run: docker compose logs app

      - name: Stop docker-compose
        if: always()
        run: docker compose down -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
